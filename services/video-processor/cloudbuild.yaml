# Cloud Build pipeline for video-processor Cloud Run-deploy.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: services/video-processor
    args:
      - build
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/video-processor-v2:${SHORT_SHA}
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/video-processor-v2:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/video-processor-v2:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/video-processor-v2:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - video-processor-v2
      - --image=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/video-processor-v2:${SHORT_SHA}
      - --region=europe-north1
      - --project=${PROJECT_ID}
      - --service-account=staging-runner@${PROJECT_ID}.iam.gserviceaccount.com
      - --set-env-vars=GCS_BUCKET_NAME=evenero-staging-cloud
      - --memory=4Gi
      - --cpu=4
      - --concurrency=1
      - --max-instances=30
      - --min-instances=0
      - --timeout=3600s
      - --no-allow-unauthenticated
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
