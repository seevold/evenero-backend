# Cloud Build pipeline for cleanup-job PROD — Cloud Run JOB.
# Triggers på push til main-branch. Build context er repo-rot.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: services/cleanup-job
    args:
      - build
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cleanup-job:${SHORT_SHA}
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cleanup-job:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cleanup-job:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cleanup-job:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - cleanup-job
      - --image=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cleanup-job:${SHORT_SHA}
      - --region=europe-north1
      - --project=${PROJECT_ID}
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
