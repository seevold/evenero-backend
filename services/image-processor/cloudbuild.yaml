# Cloud Build pipeline for image-processor Cloud Run-deploy.
# Source er repo-rot, dir peker til services/image-processor.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: services/image-processor
    args:
      - build
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/image-processor-v2:${SHORT_SHA}
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/image-processor-v2:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/image-processor-v2:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/image-processor-v2:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - image-processor-v2
      - --image=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/image-processor-v2:${SHORT_SHA}
      - --region=europe-north1
      - --project=${PROJECT_ID}
      - --service-account=staging-runner@${PROJECT_ID}.iam.gserviceaccount.com
      - --set-env-vars=GCS_BUCKET_NAME=evenero-staging-cloud
      - --memory=1Gi
      - --cpu=1
      - --concurrency=4
      - --max-instances=25
      - --min-instances=0
      - --timeout=120s
      - --no-allow-unauthenticated
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
