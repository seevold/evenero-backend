# Cloud Build pipeline for zipper-service-v2 Cloud Run-deploy (PROD).

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: services/zipper-service-v2
    args:
      - build
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/zipper-service-v2:${SHORT_SHA}
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/zipper-service-v2:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/zipper-service-v2:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/zipper-service-v2:latest

  - id: deploy-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - zipper-service-v2
      - --image=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/zipper-service-v2:${SHORT_SHA}
      - --region=europe-north1
      - --project=${PROJECT_ID}
      - --service-account=prod-runner@${PROJECT_ID}.iam.gserviceaccount.com
      # ZIP_BACKEND default = tasks (eksisterende flyt). For å aktivere
      # Cloud Run Jobs-flyt: `gcloud run services update zipper-service-v2
      # --update-env-vars=ZIP_BACKEND=jobs --region=europe-north1`. Instant rollback
      # ved å sette tilbake til tasks. JOB_NAME peker på Cloud Run Job nedenfor.
      #
      # ZIP_OUTPUT default = gcs (skriv til GCS bucket). For å aktivere R2:
      # `--update-env-vars=ZIP_OUTPUT=r2 --region=europe-north1`. Krever at R2-
      # secrets + R2_ACCOUNT_ID/BUCKET er satt. Rollback = sett tilbake til gcs.
      - --set-env-vars=^|^GCS_BUCKET_NAME=evenero-cloud|GCP_PROJECT_ID=${PROJECT_ID}|QUEUE_LOCATION=europe-west1|QUEUE_NAME=zip-queue-v2-prod|WORKER_SERVICE_ACCOUNT=prod-runner@${PROJECT_ID}.iam.gserviceaccount.com|SERVICE_URL=https://zipper-service-v2-467452422363.europe-north1.run.app|WEBHOOK_URL=https://main-api-467452422363.europe-north1.run.app/api/zip-ready|ZIP_BACKEND=tasks|JOB_NAME=zipper-job|JOB_LOCATION=europe-north1|MAX_CONCURRENT_JOB_EXECUTIONS=10|ZIP_OUTPUT=gcs|R2_ACCOUNT_ID=|R2_BUCKET=evenero-zips-prod
      - --set-secrets=WEBHOOK_API_KEY=prod-webhook-api-key:latest,R2_ACCESS_KEY_ID=prod-r2-access-key-id:latest,R2_SECRET_ACCESS_KEY=prod-r2-secret-access-key:latest
      - --memory=512Mi
      - --cpu=1
      - --concurrency=3
      - --max-instances=5
      - --min-instances=0
      - --timeout=3600s
      - --allow-unauthenticated
      - --quiet

  # Cloud Run Job — kjører i Job-mode (JOB_MODE=true) for langvarig ZIP-prosessering
  # uten Cloud Tasks 30-min-deadline. Bruker samme container-image som Service-en.
  # task-timeout=12t gir komfortabel margin for 100+ GB ZIPs (lineær: ~13 MB/s).
  # 2 vCPU + 2 GiB for raskere arkivering. max-retries=3 for transient feil.
  - id: deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - zipper-job
      - --image=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/zipper-service-v2:${SHORT_SHA}
      - --region=europe-north1
      - --project=${PROJECT_ID}
      - --service-account=prod-runner@${PROJECT_ID}.iam.gserviceaccount.com
      - --set-env-vars=^|^GCS_BUCKET_NAME=evenero-cloud|GCP_PROJECT_ID=${PROJECT_ID}|WEBHOOK_URL=https://main-api-467452422363.europe-north1.run.app/api/zip-ready|JOB_MODE=true|QUEUE_NAME=unused-in-job-mode|SERVICE_URL=unused-in-job-mode|WORKER_SERVICE_ACCOUNT=unused-in-job-mode|ZIP_OUTPUT=gcs|R2_ACCOUNT_ID=|R2_BUCKET=evenero-zips-prod
      - --set-secrets=WEBHOOK_API_KEY=prod-webhook-api-key:latest,R2_ACCESS_KEY_ID=prod-r2-access-key-id:latest,R2_SECRET_ACCESS_KEY=prod-r2-secret-access-key:latest
      - --memory=2Gi
      - --cpu=2
      - --max-retries=3
      - --task-timeout=43200s
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
