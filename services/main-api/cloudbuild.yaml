# Cloud Build pipeline for main-api Cloud Run-deploy.
#
# Trigger: push til main-branch, only når services/main-api/** endres.
# Source er repo-rot (services/main-api/cloudbuild.yaml), så vi må bruke
# `dir: services/main-api` for å peke på riktig working directory.

steps:
  - id: debug-ls
    name: alpine
    entrypoint: sh
    args:
      - -c
      - |
        echo "=== /workspace ==="
        ls -la /workspace
        echo "=== /workspace/services/main-api ==="
        ls -la /workspace/services/main-api
        echo "=== package-lock.json present? ==="
        ls -la /workspace/services/main-api/package-lock.json || echo "MISSING"
        wc -l /workspace/services/main-api/package-lock.json || true

  - id: build
    name: gcr.io/cloud-builders/docker
    dir: services/main-api
    args:
      - build
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/main-api-staging:${SHORT_SHA}
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/main-api-staging:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/main-api-staging:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/main-api-staging:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - main-api-staging
      - --image=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/main-api-staging:${SHORT_SHA}
      - --region=europe-north1
      - --project=${PROJECT_ID}
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
