# Cloud Build pipeline for web-api Cloud Run-deploy.
#
# Trigger: push til main-branch, only når services/web-api/** endres.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/web-api-staging:${SHORT_SHA}
      - --tag=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/web-api-staging:latest
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/web-api-staging:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/web-api-staging:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - web-api-staging
      - --image=europe-north1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/web-api-staging:${SHORT_SHA}
      - --region=europe-north1
      - --project=${PROJECT_ID}
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
